var ITER=200000;
function b64bytes(s){
  var bin=atob(s);
  return Uint8Array.from(bin,function(c){return c.charCodeAt(0);});
}
function decrypt(pw){
  var enc=new TextEncoder();
  return crypto.subtle.importKey("raw",enc.encode(pw),{name:"PBKDF2"},false,["deriveKey"])
    .then(function(baseKey){
      return crypto.subtle.deriveKey(
        {name:"PBKDF2",salt:b64bytes(SALT_B64),iterations:ITER,hash:"SHA-256"},
        baseKey,{name:"AES-GCM",length:256},false,["decrypt"]);
    })
    .then(function(key){
      return crypto.subtle.decrypt({name:"AES-GCM",iv:b64bytes(IV_B64)},key,b64bytes(CT_B64));
    })
    .then(function(buf){
      return new TextDecoder("utf-8").decode(new Uint8Array(buf));
    });
}
function reveal(html){document.open();document.write(html);document.close();}
var form=document.getElementById("gate-form");
var btn=document.getElementById("gate-btn");
var msg=document.getElementById("gate-msg");
function secure(){
  if(window.crypto&&crypto.subtle) return true;
  msg.textContent="Open this page via its https:// address (not a local file).";
  return false;
}
// Auto-unlock within the same tab session, if the password was cached.
var cached=sessionStorage.getItem("bl_pw");
if(cached&&window.crypto&&crypto.subtle){
  decrypt(cached).then(reveal).catch(function(){sessionStorage.removeItem("bl_pw");});
}
form.addEventListener("submit",function(e){
  e.preventDefault();
  if(!secure()) return;
  var pw=document.getElementById("gate-pw").value;
  btn.disabled=true; msg.textContent="Decrypting…";
  decrypt(pw).then(function(html){
    sessionStorage.setItem("bl_pw",pw);
    reveal(html);
  }).catch(function(){
    btn.disabled=false;
    msg.textContent="Incorrect password.";
    var f=document.getElementById("gate-pw"); f.select();
  });
});
</script>
